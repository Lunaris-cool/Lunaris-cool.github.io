<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunaris Docs - Welcome</title>
  <!-- Favicon -->
<link rel="icon" href="favicon.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg-gradient-1: #0f0c20;
  --bg-gradient-2: #24143a;
  --primary: #9d4edd;
  --primary-hover: #b062eb;
  --bubble-glass: rgba(255,255,255,0.06);
  --bubble-border: rgba(255,255,255,0.12);
  --text-main: #ffffff;
  --text-muted: rgba(255,255,255,0.6);
  --bounce: cubic-bezier(0.175,0.885,0.32,1.4);
  --smooth: cubic-bezier(0.4,0,0.2,1);
}

* {margin:0; padding:0; box-sizing:border-box;}
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg,var(--bg-gradient-1),var(--bg-gradient-2));
  color: var(--text-main);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  transition: opacity 0.5s ease;
}

h1 {font-size:3rem; margin-bottom:1rem;}
p {font-size:1.2rem; margin-bottom:2rem; color:var(--text-muted);}

#getStartedBtn {
  padding: 14px 28px;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-main);
  background: var(--primary);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s var(--smooth);
}
#getStartedBtn:hover {background: var(--primary-hover);}
</style>
</head>

<body>
  <h1>Welcome to Lunaris Docs</h1>
  <p>Modern, clean documentation with bubbly glassmorphism style. (vibecoded) but with actual shit</p>
  <button id="getStartedBtn">Get Started</button>

  <script>
    document.getElementById('getStartedBtn').addEventListener('click', () => {
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = 'docs.html';
      }, 500);
    });
  </script>
</body>
</html>
